# Demo-only credentials. Replace these before using outside a local lab.
apiVersion: v1
kind: Secret
metadata:
  name: bookstack-db
type: Opaque
data:
  MYSQL_ROOT_PASSWORD: Ym9va3N0YWNrLXJvb3QtcGFzc3dvcmQ=
  MYSQL_DATABASE: Ym9va3N0YWNr
  MYSQL_USER: Ym9va3N0YWNr
  MYSQL_PASSWORD: Ym9va3N0YWNrLXBhc3N3b3Jk
---
apiVersion: v1
kind: Secret
metadata:
  name: bookstack-app
type: Opaque
data:
  # Laravel app key for local demos only.
  APP_KEY: YmFzZTY0Ok1USXpORFUyTnpnNU1ERXlNelExTmpjNE9UQXhNak0wTlRZM09Ea3dNVEk9
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
type: Opaque
stringData:
  username: admin
  password: change-me-keycloak-admin
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy
type: Opaque
stringData:
  # Must match the imported Keycloak client secret in keycloak.yaml.
  client-secret: change-me-oauth2-client-secret
  # Demo-only 32-byte base64url cookie secret. Generate a fresh one outside labs.
  cookie-secret: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
---
apiVersion: v1
kind: Secret
metadata:
  name: woodpecker
type: Opaque
stringData:
  # Demo placeholders. Register a real GitHub OAuth app with callback
  # http://woodpecker.apps-sso.localtest.me:30080/authorize before using Woodpecker login.
  github-client: change-me-github-client-id
  github-secret: change-me-github-client-secret
  agent-secret: change-me-woodpecker-agent-secret
