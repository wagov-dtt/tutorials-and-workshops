# Static Traefik edge for Apps SSO.
# Trust boundary: only this Traefik deployment should reach /oauth2/auth and set X-Auth-Request-* upstream headers.
apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/part-of: apps-sso
data:
  traefik.yaml: |
    entryPoints:
      web:
        address: ":8000"
    api:
      dashboard: true
      insecure: true
    ping: {}
    log:
      level: INFO
    accessLog: {}
    providers:
      file:
        filename: /etc/traefik/dynamic.yaml
        watch: true
  dynamic.yaml: |
    http:
      routers:
        oauth2-proxy:
          entryPoints: [web]
          rule: Host(`oauth2.apps-sso.localtest.me`) && PathPrefix(`/oauth2`)
          service: oauth2-proxy
        keycloak:
          entryPoints: [web]
          rule: Host(`keycloak.apps-sso.localtest.me`)
          service: keycloak
        bookstack:
          entryPoints: [web]
          rule: Host(`bookstack.apps-sso.localtest.me`)
          middlewares: [sso]
          service: bookstack
        kanboard:
          entryPoints: [web]
          rule: Host(`kanboard.apps-sso.localtest.me`)
          middlewares: [sso]
          service: kanboard
        woodpecker:
          entryPoints: [web]
          rule: Host(`woodpecker.apps-sso.localtest.me`)
          middlewares: [sso]
          service: woodpecker

      middlewares:
        sso:
          chain:
            middlewares:
              - sso-auth
              - sso-errors
        sso-auth:
          forwardAuth:
            address: http://oauth2-proxy.apps-sso.svc.cluster.local/oauth2/auth
            trustForwardHeader: true
            maxBodySize: 1048576
            authResponseHeaders:
              - X-Auth-Request-User
              - X-Auth-Request-Email
              - X-Auth-Request-Preferred-Username
              - X-Auth-Request-Groups
              - X-Auth-Request-Access-Token
        sso-errors:
          errors:
            status:
              - "401-403"
            service: oauth2-proxy
            query: /oauth2/start?rd={url}

      services:
        oauth2-proxy:
          loadBalancer:
            servers:
              - url: http://oauth2-proxy.apps-sso.svc.cluster.local
        keycloak:
          loadBalancer:
            servers:
              - url: http://keycloak.apps-sso.svc.cluster.local
        bookstack:
          loadBalancer:
            servers:
              - url: http://bookstack.apps-sso.svc.cluster.local
        kanboard:
          loadBalancer:
            servers:
              - url: http://kanboard.apps-sso.svc.cluster.local
        woodpecker:
          loadBalancer:
            servers:
              - url: http://woodpecker.apps-sso.svc.cluster.local
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traefik
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/part-of: apps-sso
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traefik
  template:
    metadata:
      labels:
        app: traefik
    spec:
      containers:
        - name: traefik
          image: traefik:v3
          args:
            - --configFile=/etc/traefik/traefik.yaml
          ports:
            - name: web
              containerPort: 8000
            - name: admin
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/traefik
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /ping
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: traefik-config
---
apiVersion: v1
kind: Service
metadata:
  name: traefik
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/part-of: apps-sso
spec:
  type: NodePort
  selector:
    app: traefik
  ports:
    - name: web
      port: 80
      targetPort: web
      nodePort: 30080
    - name: admin
      port: 8080
      targetPort: admin
