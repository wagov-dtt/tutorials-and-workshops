name: Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true
          install_args: go hugo-extended github:sass/dart-sass
          cache: true
          github_token: ${{ github.token }}

      - name: Build Hugo site
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: mise exec -- hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Verify LLM outputs
        run: |
          test -s public/llms.txt
          test -s public/llms-components.json
          test -s public/index.md

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
