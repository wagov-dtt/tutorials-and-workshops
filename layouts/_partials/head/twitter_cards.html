<meta name="twitter:card" content="{{ if $.Scratch.Get "thumbnail" }}summary_large_image{{ else }}summary{{ end }}">
<meta name="twitter:title" content="{{ $.Scratch.Get "title" }}">
<meta name="twitter:description" content="{{ $.Scratch.Get "description" }}">
{{ with $.Scratch.Get "thumbnail" -}}
    <meta name="twitter:image" content="{{ . }}">
    <meta name="twitter:image:alt" content="{{ $.Scratch.Get "title" }}">
{{ end -}}
