# Demo-only credentials. Replace these before using outside a local lab.
apiVersion: v1
kind: Secret
metadata:
  name: bookstack-db
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: bookstack-root-password
  MYSQL_DATABASE: bookstack
  MYSQL_USER: bookstack
  MYSQL_PASSWORD: bookstack-password
---
apiVersion: v1
kind: Secret
metadata:
  name: bookstack-app
type: Opaque
stringData:
  # Laravel app key for local demos only.
  APP_KEY: base64:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
type: Opaque
stringData:
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: admin-password
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy
type: Opaque
stringData:
  OAUTH2_PROXY_CLIENT_SECRET: collab-forward-auth-secret
  # 32-byte demo cookie secret, base64 encoded.
  OAUTH2_PROXY_COOKIE_SECRET: MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
