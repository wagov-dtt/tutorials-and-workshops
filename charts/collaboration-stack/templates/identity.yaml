apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      serviceAccountName: keycloak
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0
          args: ["start-dev", "--import-realm"]
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: keycloak-admin
          env:
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_PROXY_HEADERS
              value: xforwarded
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
spec:
  selector:
    app: keycloak
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      serviceAccountName: oauth2-proxy
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=keycloak-oidc
            - --client-id=traefik-forward-auth
            - --oidc-issuer-url=http://keycloak:8080/realms/collab
            - --login-url=http://keycloak.localhost:8080/realms/collab/protocol/openid-connect/auth
            - --redeem-url=http://keycloak:8080/realms/collab/protocol/openid-connect/token
            - --profile-url=http://keycloak:8080/realms/collab/protocol/openid-connect/userinfo
            - --validate-url=http://keycloak:8080/realms/collab/protocol/openid-connect/userinfo
            - --redirect-url=http://auth.localhost:8080/oauth2/callback
            - --email-domain=*
            - --upstream=static://202
            - --http-address=0.0.0.0:4180
            - --reverse-proxy=true
            - --cookie-secure=false
            - --skip-provider-button=true
            - --set-xauthrequest=true
            - --pass-access-token=true
          envFrom:
            - secretRef:
                name: oauth2-proxy
          ports:
            - name: http
              containerPort: 4180
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
spec:
  selector:
    app: oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180
